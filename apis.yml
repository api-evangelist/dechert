aid: dechert
name: Dechert
description: >-
  Dechert LLP is a global law firm founded in 1875 and headquartered in
  Philadelphia, Pennsylvania, with "more than 900 lawyers" across 22 offices in
  the United States, Europe, the Middle East, and Asia (Wikipedia cites roughly
  1,000 attorneys in 20 offices; the firm itself emphasizes a global footprint
  spanning the U.S., Europe, Asia, and the Middle East). The firm is known for
  market-leading practices in financial services and investment management,
  private equity, private credit, mergers and acquisitions, international
  arbitration, intellectual property, life sciences, white collar enforcement,
  and antitrust. Dechert publishes deep thought-leadership through its OnPoint
  series, Crypto Bytes, FSR Radar, THE CRED, and ReTorts; produces multiple
  podcasts (Dechert 4 Real, Committed Capital, Dechert On Reg); and operates
  proprietary information platforms including DAMITT (Dechert Antitrust Merger
  Investigation Timing Tracker), World Compass, World Passport, Dechert Direct,
  and a Box Portal. Despite these data-driven products, Dechert does not expose
  any public developer API, SDK, OpenAPI specification, GraphQL endpoint,
  webhook surface, status page, changelog, or developer portal, and does not
  publish an RSS feed for OnPoint or any blog series — its only public-facing
  subscription mechanism is an email preference form.

x-developer-surface: none
x-developer-surface-notes: >-
  Dechert LLP publishes no public developer API, SDK, CLI, OpenAPI/AsyncAPI
  specification, JSON Schema, GraphQL endpoint, webhooks, status page,
  changelog, or developer portal. There is no GitHub organization at
  github.com/dechert or github.com/dechertllp. The firm's machine-readable
  surface is effectively zero — even a public RSS feed is absent (https://
  www.dechert.com/feed.html, /rss.html, and /knowledge/feed.html all 404).
  Subscribers receive OnPoint and other publications via the email preference
  form at https://info.dechert.com/17/4315/forms/preference-form.asp.
  Proprietary information platforms (DAMITT, World Compass, World Passport,
  Dechert Direct, Box Portal) are either downloadable PDF reports or
  authenticated client-only surfaces, not developer-accessible APIs.
